site_name: CompPsych
site_description: A tidy tutorial for computational psychology
site_author: Huaqi Yang
site_url: https://younghachi.github.io/CompPsychTutorial/

repo_name: GitHub
repo_url: https://github.com/younghachi/CompPsychTutorial
edit_uri: edit/main/docs/

# 主题配置
theme:
  name: readthedocs
  locale: zh_CN
  highlightjs: true
  hljs_languages:
    - python
    - r
    - matlab
    - bash
  navigation_depth: 3
  collapse_navigation: false
  titles_only: false

# 插件配置
plugins:
  - search:
      lang: 
        - zh
        - en

markdown_extensions:
  # Python Markdown 基础扩展
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - toc:
      permalink: true
      toc_depth: 3
  - tables
  - fenced_code
  
  # PyMdown 扩展（简化配置）
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.highlight:
      linenums: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

