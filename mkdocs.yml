site_name: CompPsych
site_description: A tidy tutorial for computational psychology
site_author: Huaqi Yang
site_url: https://younghachi.github.io/CompPsychTutorial/

repo_name: GitHub
repo_url: https://github.com/younghachi/CompPsychTutorial
edit_uri: edit/main/docs/

# 主题配置
theme:
  name: material
  language: zh
  palette:
    # 白天模式
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: 切换至夜间模式
    # 夜间模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: 切换至白天模式
  font:
    text: Noto Sans SC
    code: Fira Code
  features:
    - navigation.tabs          # 顶部标签导航
    - navigation.sections      # 章节展开
    - navigation.expand        # 默认展开导航
    - navigation.top           # 返回顶部按钮
    - navigation.tracking      # URL跟踪当前页面
    - search.suggest           # 搜索建议
    - search.highlight         # 搜索结果高亮
    - search.share             # 分享搜索结果
    - content.code.copy        # 代码复制按钮
    - content.code.annotate    # 代码注释
    - content.tabs.link        # 标签页联动
    - announce.dismiss         # 可关闭公告

# 插件配置
plugins:
  - search:
      lang: 
        - zh
        - en
  - minify:
      minify_html: true
  - git-revision-date-localized:
      enable_creation_date: true
      type: date
      fallback_to_build_date: true

markdown_extensions:
  # Python Markdown 基础扩展
  - abbr                      # 缩写
  - admonition                # 提示框
  - attr_list                 # 属性列表
  - def_list                  # 定义列表
  - footnotes                 # 脚注
  - md_in_html                # HTML内嵌Markdown
  - toc:
      permalink: true          # 标题链接
      toc_depth: 3             # 目录深度
  
  # PyMdown 扩展
  - pymdownx.arithmatex:      # LaTeX数学公式
      generic: true
  - pymdownx.betterem:        # 强调优化
  - pymdownx.caret:           # 上标
  - pymdownx.details:         # 折叠详情
  - pymdownx.emoji:           # 表情符号
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:       # 代码高亮
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite:    # 行内代码高亮
  - pymdownx.keys:            # 键盘按键
  - pymdownx.magiclink:       # 自动链接
  - pymdownx.mark:            # 标记
  - pymdownx.smartsymbols:    # 智能符号
  - pymdownx.snippets:        # 代码片段
  - pymdownx.superfences:     # 超级代码块
  - pymdownx.tabbed:          # 标签页
      alternate_style: true
  - pymdownx.tasklist:        # 任务列表
      custom_checkbox: true
  - pymdownx.tilde:           # 下标

extra_javascript:
  - assets/javascripts/mathjax.js
  - https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

